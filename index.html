<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chattingo App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #f4f6f9;
      color: #333;
    }

    /* Navbar */
    .navbar {
      background: #1e293b;
      color: white;
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 15px;
    }

    .nav-links a:hover {
      color: #38bdf8;
    }

    /* Hero */
    .hero {
      padding: 60px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .hero-text {
      max-width: 500px;
    }

    .hero-text h1 {
      font-size: 42px;
      margin-bottom: 15px;
      color: #0f172a;
    }

    .hero-text p {
      font-size: 16px;
      margin-bottom: 25px;
      color: #64748b;
    }

    .btn {
      background: #0ea5e9;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .btn:hover {
      background: #0284c7;
    }

    /* Card */
    .card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      width: 320px;
    }

    .card h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      outline: none;
    }

    .input-group input:focus {
      border-color: #0ea5e9;
    }

    .footer {
      text-align: center;
      padding: 25px;
      margin-top: 40px;
      color: #64748b;
      font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        gap: 30px;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">Chattingo</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Features</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-text">
      <h1>Connect & Chat Seamlessly</h1>
      <p>
        Experience real-time messaging with a clean and powerful interface.
        Fast, secure, and built for modern communication.
      </p>
      <button class="btn">Get Started</button>
    </div>

    <!-- Auth Card -->
    <div class="card">
      <h2>Login</h2>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password">
      </div>

      <button class="btn" style="width:100%; margin-top:10px;">
        Sign In
      </button>
    </div>
  </section>

  <!-- Footer -->
  <div class="footer">
    © 2026 Chattingo. All rights reserved.
  </div>

</body>
</html>

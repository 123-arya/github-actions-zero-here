name: python web application

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name : Setup python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: install dependencies
        run: pip install -r requiremnets.txt

      - name: run flask
        run: python app.py
